<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BASH — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0f;
    color: #f0f0ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: radial-gradient(ellipse at 50% 50%, rgba(255,60,172,0.15) 0%, transparent 70%);
  }
  .container { max-width: 400px; }
  .emoji { font-size: 5rem; margin-bottom: 24px; animation: bounce 2s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #ff3cac, #7928ca);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  p { color: #9898b8; font-size: 1rem; line-height: 1.6; margin-bottom: 28px; }
  button {
    padding: 14px 28px;
    background: linear-gradient(135deg, #ff3cac, #7928ca);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
  }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
</style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>No Signal!</h1>
    <p>Looks like you're offline. The party can't stop but the internet did 😭<br><br>Check your connection and try again!</p>
    <button onclick="window.location.reload()">Try Again 🔄</button>
  </div>
</body>
</html>
